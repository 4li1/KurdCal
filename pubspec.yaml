name: kurdish_calendar
description: A premium Kurdish cultural calendar app featuring three calendar systems, historical events, and traditional Kurdish aesthetics.
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Google Fonts (Vazirmatn for Kurdish/Arabic support)
  google_fonts: ^6.2.1

  # Local Notifications
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4

  # Shared Preferences (notification prefs, settings)
  shared_preferences: ^2.3.0

  # SVG support for Jamadani patterns and Kurdish sun emblem
  flutter_svg: ^2.0.10+1

  # Animations
  flutter_animate: ^4.5.0

  # Drift ORM (SQLite, for production DB)
  # Uncomment when you set up the full database:
  # drift: ^2.17.0
  # drift_flutter: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # build_runner: ^2.4.11       # Needed for Drift code generation
  # drift_dev: ^2.17.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  # fonts: (Vazirmatn is loaded at runtime via google_fonts — no local declarations needed)
  # To add local copies for offline support, uncomment and fill in:
  # fonts:
  #   - family: Vazirmatn
  #     fonts:
  #       - asset: assets/fonts/Vazirmatn-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Vazirmatn-Bold.ttf
  #         weight: 700
